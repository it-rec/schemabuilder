[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["test_documents", "definitions"]

[tool.ruff.lint]
# Conservative starter set: pyflakes (F), pycodestyle errors (E), import-order
# (I), and bugbear (B). Style nits beyond this can be added later once the
# baseline is clean.
select = ["E", "F", "I", "B"]
ignore = [
    "E501",  # line length — formatter's job
    "B008",  # do not perform function call in argument defaults (FastAPI uses Depends/Query)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]  # assert False is fine in tests

[tool.mypy]
python_version = "3.11"
files = ["main.py"]
ignore_missing_imports = true
# Loose to start: catch obvious type errors without forcing every helper to
# be annotated. Tighten incrementally by removing flags below.
check_untyped_defs = false
disallow_untyped_defs = false
warn_unused_ignores = true
warn_redundant_casts = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
