name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (pytest + ruff + mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install lint/test tooling
        # Heavy ML deps from requirements.txt aren't needed for the test suite —
        # Docling is mocked in tests/test_api.py. Install only what the tests
        # and linters import so CI stays fast.
        #
        # python-multipart is NOT optional: FastAPI's UploadFile path
        # (POST /api/documents) imports the multipart parser at route-
        # registration time. Without it, `import main` raises and every
        # pytest + the OpenAPI drift step fail with a misleading stack.
        # Keep this list in sync with CLAUDE.md → Backend → Install deps.
        run: |
          python -m pip install --upgrade pip
          pip install fastapi pydantic pytest httpx ruff mypy python-multipart
      - name: Ruff
        run: ruff check .
      - name: Mypy
        # Non-strict for now; the goal is to catch obvious regressions
        # without forcing every function to be annotated up front.
        run: mypy --ignore-missing-imports --no-strict-optional main.py || true
      - name: OpenAPI snapshot drift check
        # Regenerate the schema and diff against the committed snapshot.
        # A non-empty diff fails the build with a clear message. The same
        # check runs as a pytest case (test_openapi_snapshot_is_up_to_date)
        # so locally a developer sees the failure on `pytest` too; this
        # standalone step exists so CI surfaces the failure even if other
        # tests are broken.
        run: |
          python export_openapi.py > /tmp/openapi-live.json
          diff -u openapi-snapshot.json /tmp/openapi-live.json \
            || (echo "::error::OpenAPI snapshot is stale. Run: cd backend && python export_openapi.py SNAPSHOT"; exit 1)
      - name: Pytest
        run: pytest tests/ -q

  frontend-lint:
    name: Frontend (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint -- --max-warnings 999

  frontend-test:
    name: Frontend (test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Test
        run: npm run test:ci

  frontend-build:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Build
        run: npm run build

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # The other jobs are cheap and fail fast — letting them gate this one
    # means a typo in eslint / pytest doesn't waste the 4-5 min Docling install.
    needs: [backend, frontend-lint, frontend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend (full requirements — Playwright uses real Docling)
        # Unlike the `backend` job (which mocks Docling and installs only the
        # lint/test tooling), the E2E job needs every runtime dep. The sample
        # PDF is digital so DOCLING_DO_OCR=0 keeps OCR off the hot path, but
        # the converter import itself drags in pypdfium2, torch, etc.
        # python-multipart is in requirements.txt so it's covered here too.
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install uvicorn

      - name: Install frontend
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: frontend
        # --with-deps pulls in apt packages Chromium needs in a clean runner
        # (libnss, libdrm, etc.). Skipping these surfaces as cryptic
        # "page.goto: net::ERR_FAILED" errors at run time.
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        # CI=true puts Playwright into the strict mode the config gates on
        # (no .only, retries=1, reporter=html). The webServer entries in the
        # config start uvicorn + vite on isolated ports and tear them down.
        env:
          CI: "true"
        run: npm run test:e2e

      - name: Publish failure summary
        # Runs even on success so a green build still gets a one-line
        # summary, but the interesting case is failure: parse the json
        # reporter output and write each failed test (with its error
        # message) into GITHUB_STEP_SUMMARY. The summary block is rendered
        # at the bottom of the workflow run page and is visible to anyone
        # who can see the repo, even without an auth token to fetch the
        # raw log stream.
        if: always()
        working-directory: frontend
        run: |
          set +e
          F=test-results/results.json
          {
            echo "## Playwright results"
            if [ ! -f "$F" ]; then
              echo "_(no json report — Playwright likely failed before the suite started)_"
              exit 0
            fi
            node -e '
              const r = JSON.parse(require("fs").readFileSync("test-results/results.json", "utf8"));
              const s = r.stats || {};
              console.log(`- expected: ${s.expected ?? 0}`);
              console.log(`- unexpected (failed): ${s.unexpected ?? 0}`);
              console.log(`- flaky: ${s.flaky ?? 0}`);
              console.log(`- skipped: ${s.skipped ?? 0}`);
              const failed = [];
              const walk = (suites=[]) => {
                for (const s of suites) {
                  for (const sp of s.specs || []) {
                    for (const t of sp.tests || []) {
                      for (const res of t.results || []) {
                        if (res.status !== "passed" && res.status !== "skipped") {
                          failed.push({
                            title: `${s.title} > ${sp.title}`,
                            error: (res.error && (res.error.message || res.error.value)) || res.errors?.[0]?.message || "(no message)",
                          });
                        }
                      }
                    }
                  }
                  walk(s.suites);
                }
              };
              walk(r.suites || []);
              if (failed.length === 0) {
                console.log("\nAll tests passed.");
              } else {
                console.log("\n### Failures");
                for (const f of failed) {
                  console.log(`\n#### ${f.title}`);
                  console.log("```");
                  console.log(String(f.error).split("\n").slice(0, 30).join("\n"));
                  console.log("```");
                }
              }
            '
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 14
          if-no-files-found: ignore
